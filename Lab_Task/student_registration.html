<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Student Registration Form</h1>
  <form action="#" method="post">
    <fieldset>
      <legend>Personal Information</legend>
      <label for="name">Full Name:</label>
      <input type="text" name="name" id="name" placeholder="Enter your full name" required ><br><br>
      <label for="id">Student ID:</label>
      <input type="text" name="id" id="id" placeholder="Enter your student ID" required><br><br>
      <label for="email">Email:</label>
      <input type="email" name="email" id="email" placeholder="Enter your email" required><br><br>
      <label for="phone">Phone Number:</label>
      <input type="tel" name="phone" id="phone" placeholder="Enter your phone number" required><br><br>
      <label for ="dob">Date of Birth:</label>
      <input type="date" name="dob" id="dob" required>
      <br><br>
      <label for="gender">Gender:</label>
      <input type ="radio" name="gender" id="male" value="male" required>
      <label for="male">Male</label>
      <input type ="radio" name="gender" id="female" value="female" required>
      <label for="female">Female</label>
      <input type="radio" name="gender" id="other" value="other" required>
      <label for="other">Others</label>
    </fieldset>


    <fieldset>
      <legend>Academic Information</legend>
      <label for="department">Department:</label>
      <select name="department" id="department" required>
        <option value="">Select Department</option>
        <option value="CSC">Computer Science & Engineering</option>
        <option value="EEE">Electrical and Electronics Engineering</option>
        <option value="BBA">Business Administration</option>
        <option value="ENGLISH">BA in English</option>
        <option value="CIVIL">Civil Engineering</option>
      </select><br><br>
      <label for="semester">Semester:</label>
      <select name="semester" id="semester" required>
        <option value="">Select Semester</option>
        <option value="1">1st Semester</option>
        <option value="2">2nd Semester</option>
        <option value="3">3rd Semester</option>
        <option value="4">4th Semester</option>
        <option value="5">5th Semester</option>
        <option value="6">6th Semester</option>
        <option value="7">7th Semester</option>
        <option value="8">8th Semester</option>
      </select><br><br>
    </fieldset>

    <fieldset>
      <legend>Skills</legend>
      <label for="skills">Select Programming Languages Known:</label><br>
      <input type="checkbox" name="skills" id="py" value="Python">
      <label for="py">Python</label><br>
      <input type="checkbox" name="skills" id="java" value="Java">
      <label for="java">Java</label><br>
      <input type="checkbox" name="skills" id="cpp" value="C++">
      <label for="cpp">C++</label><br>
      <input type="checkbox" name="skills" id="js" value="JavaScript">
      <label for="js">JavaScript</label><br>
    </fieldset>

    <fieldset>
      <legend>Additional Information:</legend>
      Address:<br>
      <textarea id="address" name="address"  placeholder="Enter your address" rows="4" cols="80"></textarea><br><br>
      <label for="photo">Upload Photo:</label>
      <input type="file" name="photo" id="photo" accept="image/*"><br><br>
      Comments:<br>
      <textarea id="textarea" name="comments" placeholder="Enter any additional comments" rows="4" cols="90" maxlength="200"></textarea><br><br>
    </fieldset>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

  </form>
</body>
</html>
